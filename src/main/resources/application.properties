spring.application.name=Norbiz

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/norbiz}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:bm9yYml6LWp3dC1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudA==}
jwt.expiration=${JWT_EXPIRATION:86400000}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

app.item-image.upload-dir=${ITEM_IMAGE_UPLOAD_DIR:${user.home}/norbiz}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

